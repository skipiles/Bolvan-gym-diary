<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bolvan Gym Diary</title>
    <script>
      // Сохраняем путь, по которому пользователь попал на страницу
      var redirect = sessionStorage.redirect
      sessionStorage.redirect = location.pathname + location.search

      // Перенаправляем на главную страницу с учетом base path
      if (redirect && redirect !== location.pathname) {
        sessionStorage.redirect = redirect
      }

      window.location.href = '/Bolvan-gym-diary/'
    </script>
    <meta http-equiv="refresh" content="0; URL=/Bolvan-gym-diary/" />
  </head>
  <body>
    <noscript>
      <h1>Bolvan Gym Diary</h1>
      <p>Для работы приложения необходим JavaScript</p>
      <p><a href="/Bolvan-gym-diary/">Перейти на главную страницу</a></p>
    </noscript>
  </body>
</html>
